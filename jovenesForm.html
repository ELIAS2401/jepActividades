<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Estudio Bíblico</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="main-header">
        <h1>Estudio Bíblico Personal</h1>
        <p>Pasaje leído: <strong>Juan 1:1-15</strong></p>
    </header>

    <div class="tabla-wrapper">
        <form id="formEstudio" class="tabla-estudio" style="padding:1rem; display:block;">

            <label>1️⃣ ¿Qué está pasando en el pasaje?</label>
            <textarea required></textarea>

            <label>2️⃣ ¿Qué me enseña acerca de Dios?</label>
            <textarea required></textarea>

            <label>3️⃣ ¿Qué me enseña acerca del ser humano?</label>
            <textarea required></textarea>

            <label>4️⃣ ¿Qué debo cambiar o aplicar?</label>
            <textarea required></textarea>

            <label>5️⃣ Escribí una oración basada en lo leído:</label>
            <textarea required></textarea>

            <button type="submit" class="btn-responder" style="margin-top:1rem;">
                Enviar Respuestas
            </button>

        </form>
    </div>
    <script>

        const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxCypFfCFbeMe4W8jRQdznu-MuyHqOPNbLdcgocm9eLqnTR7fspHzI0BMWo11ccWBVXPA/exec";

        const params = new URLSearchParams(window.location.search);
        const nombre = params.get("nombre");
        const pasaje = params.get("pasaje");

        document.querySelector("strong").textContent = pasaje;

        document.getElementById("formEstudio").addEventListener("submit", async function (e) {
            e.preventDefault();

            const respuestas = Array.from(document.querySelectorAll("textarea"))
                .map(t => t.value.trim());

            const respuestaFinal = respuestas.join("\n\n");

            try {

                const response = await fetch(WEBAPP_URL, {
                    method: "POST",
                    mode: "cors",
                    redirect: "follow",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        nombre,
                        pasaje,
                        respuesta: respuestaFinal
                    })
                });
                const result = await response.json();

                if (result.status === "OK") {
                    alert("✅ Respuesta enviada correctamente");
                    window.location.href = "index.html";
                }
                else if (result.status === "YA_RESPONDIDA") {
                    alert("⚠️ Ya fue respondida.");
                }
                else {
                    alert("Error: " + result.message);
                }

            } catch (err) {
                alert("Error de conexión.");
            }
        });
    </script>

</body>

</html>
