<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Bíblico</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" id="favicon">
    <!-- Librería para leer CSV correctamente -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <h1 id="titulo-estudio">Cargando...</h1>
        <button onclick="abrirModal()" class="btn-info">Ver info del libro</button>
    </header>

    <section class="tabla-wrapper">
        <table class="tabla-estudio">
            <thead>
                <tr>
                    <th>📅 Día</th>
                    <th>👤 Joven</th>
                    <th>📖 Pasaje</th>
                    <th>⚡ Actividad</th>
                    <th>📊 Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
            </tbody>
        </table>
    </section>

    <div id="modal-info" class="modal">
        <div class="modal-box">
            <h2 class="modal-title"></h2>
            <p class="modal-content"></p>

            <button onclick="cerrarModal()" class="btn-info">
                Cerrar
            </button>
        </div>
    </div>

    <div id="modal-respuestas" class="modal">
        <span class="cerrar-modal" onclick="cerrarModalRespuestas()">✖</span>
        <div class="modal-box modal-respuestas-box">

            <h2 class="modal-title">📖 Respuestas del estudio</h2>

            <!-- LOADER -->
            <div id="loader-respuestas" class="loader-respuestas">
                ⏳ Cargando respuestas...
            </div>

            <div id="contenido-respuestas">

                <div class="respuesta-card">
                    <h3>1️⃣ ¿Qué está pasando?</h3>
                    <p id="mr1"></p>
                </div>

                <div class="respuesta-card">
                    <h3>2️⃣ ¿Qué enseña acerca de Dios?</h3>
                    <p id="mr2"></p>
                </div>

                <div class="respuesta-card">
                    <h3>3️⃣ ¿Qué enseña del ser humano?</h3>
                    <p id="mr3"></p>
                </div>

                <div class="respuesta-card">
                    <h3>4️⃣ ¿Qué debo aplicar?</h3>
                    <p id="mr4"></p>
                </div>

                <div class="respuesta-card">
                    <h3>5️⃣ Oración</h3>
                    <p id="mr5"></p>
                </div>

            </div>
        </div>

        <script src="jovenes.js"></script>
</body>

</html>
